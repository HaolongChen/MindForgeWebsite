<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brain-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#brain-gradient)"/>
  <g transform="translate(6, 6)" fill="white" stroke="white" stroke-width="0.5">
    <!-- Simplified brain circuit icon -->
    <circle cx="5" cy="5" r="1"/>
    <circle cx="15" cy="5" r="1"/>
    <circle cx="10" cy="10" r="1"/>
    <circle cx="5" cy="15" r="1"/>
    <circle cx="15" cy="15" r="1"/>
    
    <!-- Connections -->
    <line x1="5" y1="5" x2="10" y2="10"/>
    <line x1="15" y1="5" x2="10" y2="10"/>
    <line x1="10" y1="10" x2="5" y2="15"/>
    <line x1="10" y1="10" x2="15" y2="15"/>
    <line x1="5" y1="5" x2="15" y2="5"/>
    <line x1="5" y1="15" x2="15" y2="15"/>
  </g>
</svg>
